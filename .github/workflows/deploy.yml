name: Deploy to GitHub Pages

on:
  # הפעלה אוטומטית בעת עדכון של ענף main
  push:
    branches:
      - main
  # מאפשר לך להפעיל את ה-Action גם ידנית דרך הממשק של GitHub
  workflow_dispatch:

# הרשאות מפורשות הדרושות ל-GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# מוודא שרק תהליך העלאה אחד רץ בכל פעם כדי למנוע התנגשויות (כמו השגיאה שקיבלת)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          name: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
